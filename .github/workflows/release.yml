name: Release (Windows / macOS / Linux)

# Builds installers for every desktop OS AND publishes them to a GitHub Release,
# which is the feed the in-app auto-updater checks. macOS and Linux binaries
# MUST be built on their own OS, so we fan out across native runners.
#
# To ship an update: bump "version" in package.json, commit, then:
#     git tag v0.1.6 && git push origin v0.1.6

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish macOS (arm64 + x64)
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # identity=null in package.json handles skip-signing cleanly.
          # If you later add Apple certs, set CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID /
          # APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID as repo secrets and remove the
          # two lines below so signing is auto-discovered.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Linux
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
